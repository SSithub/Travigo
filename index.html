<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRAVERSE // Spatial Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'neutral-90': '#e5e5e5',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            animation: {
              'shimmer': 'shimmer 4s infinite linear',
              'glitch': 'glitch 0.2s ease-in-out infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '-200% center' },
                '100%': { backgroundPosition: '200% center' },
              },
              glitch: {
                '0%': { transform: 'translate(0)', opacity: '1' },
                '25%': { transform: 'translate(-1px, 1px)', opacity: '0.8' },
                '50%': { transform: 'translate(1px, -1px)', opacity: '0.9' },
                '75%': { transform: 'translate(-1px, -1px)', opacity: '0.8' },
                '100%': { transform: 'translate(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      /* Custom scrollbar for the glassmorphic console */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      /* Shimmer Gradient Animation Background */
      .bg-shimmer-linear {
        background-image: linear-gradient(
          to right,
          rgba(255, 255, 255, 0.6) 0%,
          rgba(34, 211, 238, 1) 20%,
          rgba(255, 255, 255, 0.6) 40%,
          rgba(255, 255, 255, 0.6) 100%
        );
        background-size: 200% auto;
      }

      /* Reset Google Maps Popover Default Styles for Sci-Fi look */
      gmp-popover {
        --background-color: transparent;
        --padding: 0;
        --border-radius: 0;
        --box-shadow: none;
        background: transparent !important;
        box-shadow: none !important;
        pointer-events: auto;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "zustand": "https://esm.sh/zustand@4.5.2",
    "lucide-react": "https://esm.sh/lucide-react@0.378.0",
    "@vis.gl/react-google-maps": "https://esm.sh/@vis.gl/react-google-maps@1.1.0?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
